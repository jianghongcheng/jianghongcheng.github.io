<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Clinical AI Research Assistant</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f0f0f;
      color: #e0e0e0;
      min-height: 100vh;
    }

    /* Header */
    .header {
      background: #1a1a1a;
      border-bottom: 1px solid #2a2a2a;
      padding: 16px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .header-title {
      font-size: 18px;
      font-weight: 600;
      color: #fff;
      letter-spacing: -0.3px;
    }
    .header-subtitle {
      font-size: 12px;
      color: #666;
      margin-top: 2px;
    }
    .status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #4caf50;
      display: inline-block;
      margin-right: 6px;
    }
    .status-text { font-size: 12px; color: #888; }

    /* Layout */
    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 32px 24px;
      display: grid;
      grid-template-columns: 1fr 320px;
      gap: 24px;
    }

    /* Card */
    .card {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 8px;
      padding: 24px;
    }
    .card-title {
      font-size: 13px;
      font-weight: 600;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 16px;
    }

    /* Chat area */
    .chat-container { display: flex; flex-direction: column; gap: 24px; }

    .messages {
      min-height: 400px;
      max-height: 500px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 16px;
      padding: 4px 0;
    }
    .messages::-webkit-scrollbar { width: 4px; }
    .messages::-webkit-scrollbar-track { background: transparent; }
    .messages::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }

    .message { display: flex; flex-direction: column; gap: 6px; }
    .message.user { align-items: flex-end; }
    .message.assistant { align-items: flex-start; }

    .message-bubble {
      max-width: 80%;
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 14px;
      line-height: 1.6;
    }
    .message.user .message-bubble {
      background: #2a2a2a;
      color: #e0e0e0;
      border: 1px solid #333;
    }
    .message.assistant .message-bubble {
      background: #1e1e1e;
      color: #d0d0d0;
      border: 1px solid #2a2a2a;
    }

    .message-meta {
      font-size: 11px;
      color: #555;
      display: flex;
      gap: 12px;
    }
    .badge {
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 500;
    }
    .badge-blocked { background: #3a1a1a; color: #f44336; border: 1px solid #5a2a2a; }
    .badge-ok { background: #1a2a1a; color: #4caf50; border: 1px solid #2a4a2a; }
    .badge-faith { background: #1a1a2a; color: #7986cb; border: 1px solid #2a2a4a; }

    .sources {
      margin-top: 8px;
      padding: 10px 12px;
      background: #151515;
      border: 1px solid #252525;
      border-radius: 6px;
    }
    .sources-title { font-size: 11px; color: #555; margin-bottom: 6px; }
    .source-item { font-size: 12px; color: #666; padding: 3px 0; }
    .source-venue { color: #444; }

    /* Input */
    .input-area { display: flex; gap: 8px; }
    .input-field {
      flex: 1;
      background: #141414;
      border: 1px solid #2a2a2a;
      border-radius: 6px;
      padding: 12px 16px;
      font-size: 14px;
      color: #e0e0e0;
      outline: none;
      transition: border-color 0.2s;
    }
    .input-field:focus { border-color: #444; }
    .input-field::placeholder { color: #444; }

    .btn {
      padding: 12px 20px;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-primary {
      background: #e0e0e0;
      color: #0f0f0f;
    }
    .btn-primary:hover { background: #fff; }
    .btn-primary:disabled { background: #333; color: #666; cursor: not-allowed; }
    .btn-secondary {
      background: transparent;
      color: #666;
      border: 1px solid #2a2a2a;
    }
    .btn-secondary:hover { border-color: #444; color: #888; }

    /* Suggestions */
    .suggestions { display: flex; flex-wrap: wrap; gap: 8px; }
    .suggestion {
      padding: 7px 14px;
      background: #141414;
      border: 1px solid #2a2a2a;
      border-radius: 20px;
      font-size: 12px;
      color: #888;
      cursor: pointer;
      transition: all 0.2s;
    }
    .suggestion:hover { border-color: #444; color: #bbb; background: #1a1a1a; }

    /* Right sidebar */
    .sidebar { display: flex; flex-direction: column; gap: 16px; }

    /* Upload */
    .upload-area {
      border: 1px dashed #2a2a2a;
      border-radius: 6px;
      padding: 24px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
    }
    .upload-area:hover { border-color: #444; background: #141414; }
    .upload-icon { font-size: 28px; margin-bottom: 8px; }
    .upload-text { font-size: 13px; color: #666; }
    .upload-hint { font-size: 11px; color: #444; margin-top: 4px; }
    input[type="file"] { display: none; }

    /* Metrics */
    .metrics-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .metric-item { padding: 12px; background: #141414; border-radius: 6px; border: 1px solid #222; }
    .metric-value { font-size: 20px; font-weight: 600; color: #e0e0e0; }
    .metric-label { font-size: 11px; color: #555; margin-top: 2px; }

    /* Papers list */
    .papers-list { display: flex; flex-direction: column; gap: 8px; }
    .paper-item {
      padding: 10px 12px;
      background: #141414;
      border: 1px solid #222;
      border-radius: 6px;
    }
    .paper-title { font-size: 12px; color: #c0c0c0; line-height: 1.4; }
    .paper-venue { font-size: 11px; color: #555; margin-top: 3px; }

    /* Loading spinner */
    .spinner {
      display: inline-block;
      width: 14px; height: 14px;
      border: 2px solid #333;
      border-top-color: #888;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      margin-right: 8px;
      vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Typing indicator */
    .typing { display: flex; gap: 4px; padding: 12px 16px; }
    .typing span {
      width: 6px; height: 6px;
      background: #444;
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }
    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); }
      40% { transform: translateY(-6px); }
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 24px; right: 24px;
      padding: 12px 20px;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 6px;
      font-size: 13px;
      color: #e0e0e0;
      z-index: 1000;
      animation: slideIn 0.3s ease;
    }
    .toast.success { border-color: #2a4a2a; color: #4caf50; }
    .toast.error { border-color: #5a2a2a; color: #f44336; }
    @keyframes slideIn { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

    .empty-state { text-align: center; padding: 60px 20px; color: #444; }
    .empty-icon { font-size: 40px; margin-bottom: 12px; }
    .empty-text { font-size: 14px; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const API_BASE = window.location.origin === 'http://localhost:3000'
      ? 'http://localhost:8000'
      : window.location.origin;

    const SUGGESTIONS = [
      "What is SMLP-KAN's main contribution?",
      "Compare PSNR across all papers",
      "How does uTDSP achieve efficiency?",
      "What is PTSA in THAT?",
      "Explain FW-SAT architecture",
    ];

    function App() {
      const [messages, setMessages] = React.useState([]);
      const [input, setInput] = React.useState('');
      const [loading, setLoading] = React.useState(false);
      const [metrics, setMetrics] = React.useState(null);
      const [papers, setPapers] = React.useState([]);
      const [toast, setToast] = React.useState(null);
      const [uploading, setUploading] = React.useState(false);
      const messagesEndRef = React.useRef(null);
      const fileInputRef = React.useRef(null);

      React.useEffect(() => {
        fetchMetrics();
        fetchPapers();
      }, []);

      React.useEffect(() => {
        messagesEndRef.current?.scrollIntoView({ behavior: 'smooth' });
      }, [messages]);

      const showToast = (msg, type = 'success') => {
        setToast({ msg, type });
        setTimeout(() => setToast(null), 3000);
      };

      const fetchMetrics = async () => {
        try {
          const r = await fetch(`${API_BASE}/metrics`);
          const d = await r.json();
          setMetrics(d);
        } catch {}
      };

      const fetchPapers = async () => {
        try {
          const r = await fetch(`${API_BASE}/papers`);
          const d = await r.json();
          setPapers(d.papers || []);
        } catch {}
      };

      const handleSubmit = async (q = null) => {
        const question = q || input.trim();
        if (!question || loading) return;
        setInput('');
        setLoading(true);

        setMessages(prev => [...prev, { role: 'user', content: question }]);

        try {
          const r = await fetch(`${API_BASE}/query`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ question })
          });
          const d = await r.json();
          setMessages(prev => [...prev, {
            role: 'assistant',
            content: d.answer,
            sources: d.sources || [],
            latency_ms: d.latency_ms,
            faithfulness: d.faithfulness,
            blocked: d.blocked,
            block_reason: d.block_reason
          }]);
          fetchMetrics();
        } catch (e) {
          setMessages(prev => [...prev, {
            role: 'assistant',
            content: 'Connection error. Make sure the API is running on port 8000.',
            sources: [], blocked: false
          }]);
        }
        setLoading(false);
      };

      const handleUpload = async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        setUploading(true);
        const formData = new FormData();
        formData.append('file', file);
        try {
          const r = await fetch(`${API_BASE}/upload`, { method: 'POST', body: formData });
          const d = await r.json();
          showToast(`✓ ${d.message}`, 'success');
          fetchPapers();
          fetchMetrics();
        } catch (e) {
          showToast('Upload failed', 'error');
        }
        setUploading(false);
        e.target.value = '';
      };

      return (
        <div>
          {/* Header */}
          <div className="header">
            <div>
              <div className="header-title">Clinical AI Research Assistant</div>
              <div className="header-subtitle">RAG · Multi-Agent · Guardrails · Monitoring</div>
            </div>
            <div className="status-text">
              <span className="status-dot"></span>
              {metrics ? `${metrics.papers_indexed || papers.length} papers indexed` : 'Connecting...'}
            </div>
          </div>

          <div className="container">
            {/* Main chat */}
            <div className="chat-container">
              <div className="card">
                <div className="card-title">Research Query</div>

                {/* Suggestions */}
                <div className="suggestions" style={{marginBottom: 20}}>
                  {SUGGESTIONS.map((s, i) => (
                    <div key={i} className="suggestion" onClick={() => handleSubmit(s)}>{s}</div>
                  ))}
                </div>

                {/* Messages */}
                <div className="messages">
                  {messages.length === 0 && (
                    <div className="empty-state">
                      <div className="empty-icon">🔬</div>
                      <div className="empty-text">Ask about indexed research papers<br/>or upload a PDF to analyze</div>
                    </div>
                  )}
                  {messages.map((m, i) => (
                    <div key={i} className={`message ${m.role}`}>
                      <div className="message-bubble">{m.content}</div>
                      {m.role === 'assistant' && (
                        <div className="message-meta">
                          {m.blocked
                            ? <span className="badge badge-blocked">⛔ {m.block_reason}</span>
                            : <span className="badge badge-ok">✓ Passed guardrails</span>
                          }
                          {m.latency_ms && <span>{Math.round(m.latency_ms)}ms</span>}
                          {m.faithfulness > 0 && (
                            <span className="badge badge-faith">
                              faithfulness {(m.faithfulness * 100).toFixed(0)}%
                            </span>
                          )}
                        </div>
                      )}
                      {m.sources && m.sources.length > 0 && (
                        <div className="sources">
                          <div className="sources-title">Sources</div>
                          {m.sources.map((s, j) => (
                            <div key={j} className="source-item">
                              {s.title?.substring(0, 60)}... <span className="source-venue">— {s.venue}</span>
                            </div>
                          ))}
                        </div>
                      )}
                    </div>
                  ))}
                  {loading && (
                    <div className="message assistant">
                      <div className="message-bubble">
                        <div className="typing">
                          <span></span><span></span><span></span>
                        </div>
                      </div>
                    </div>
                  )}
                  <div ref={messagesEndRef} />
                </div>

                {/* Input */}
                <div className="input-area" style={{marginTop: 16}}>
                  <input
                    className="input-field"
                    value={input}
                    onChange={e => setInput(e.target.value)}
                    onKeyDown={e => e.key === 'Enter' && handleSubmit()}
                    placeholder="Ask about SMLP-KAN, uTDSP, THAT, SF-GPT, FW-SAT..."
                    disabled={loading}
                  />
                  <button className="btn btn-primary" onClick={() => handleSubmit()} disabled={loading || !input.trim()}>
                    {loading ? <><span className="spinner"></span>Thinking</> : 'Send'}
                  </button>
                  {messages.length > 0 && (
                    <button className="btn btn-secondary" onClick={() => setMessages([])}>Clear</button>
                  )}
                </div>
              </div>
            </div>

            {/* Sidebar */}
            <div className="sidebar">
              {/* Upload */}
              <div className="card">
                <div className="card-title">Upload PDF</div>
                <input ref={fileInputRef} type="file" accept=".pdf" onChange={handleUpload} />
                <div className="upload-area" onClick={() => fileInputRef.current.click()}>
                  <div className="upload-icon">{uploading ? '⏳' : '📄'}</div>
                  <div className="upload-text">{uploading ? 'Processing...' : 'Click to upload'}</div>
                  <div className="upload-hint">PDF files only • Max 10MB</div>
                </div>
              </div>

              {/* Metrics */}
              <div className="card">
                <div className="card-title">Live Metrics</div>
                <div className="metrics-grid">
                  <div className="metric-item">
                    <div className="metric-value">{metrics?.total_queries ?? '—'}</div>
                    <div className="metric-label">Queries</div>
                  </div>
                  <div className="metric-item">
                    <div className="metric-value">{metrics?.avg_latency_ms ? `${Math.round(metrics.avg_latency_ms)}ms` : '—'}</div>
                    <div className="metric-label">Avg Latency</div>
                  </div>
                  <div className="metric-item">
                    <div className="metric-value">{metrics?.avg_faithfulness ? (metrics.avg_faithfulness * 100).toFixed(0) + '%' : '—'}</div>
                    <div className="metric-label">Faithfulness</div>
                  </div>
                  <div className="metric-item">
                    <div className="metric-value">{metrics?.blocked_count ?? '—'}</div>
                    <div className="metric-label">Blocked</div>
                  </div>
                </div>
                <button className="btn btn-secondary" style={{width:'100%', marginTop:12, fontSize:12}} onClick={fetchMetrics}>
                  Refresh
                </button>
              </div>

              {/* Papers */}
              <div className="card">
                <div className="card-title">Indexed Papers ({papers.length})</div>
                <div className="papers-list">
                  {papers.map((p, i) => (
                    <div key={i} className="paper-item">
                      <div className="paper-title">{p.title?.substring(0, 70)}...</div>
                      <div className="paper-venue">{p.venue}</div>
                    </div>
                  ))}
                </div>
              </div>
            </div>
          </div>

          {toast && <div className={`toast ${toast.type}`}>{toast.msg}</div>}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
